name: Update Scholar Data

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements-scholar.txt

      - name: Fetch Scholar data
        timeout-minutes: 10
        run: python scripts/fetch_scholar.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet src/data/scholar.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/scholar.json
          git commit -m "chore: update scholar citation data"
          git pull --rebase origin main
          git push

      - name: Notify on failure
        if: failure()
        run: echo "::warning::Scholar fetch failed — citation data may be stale"
