<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // GitHub Pages SPA redirect
      // Redirects 404s back to index.html, preserving the path as a query param
      const path = window.location.pathname;
      const search = window.location.search;
      const hash = window.location.hash;
      window.location.replace(
        '/?redirect=' + encodeURIComponent(path + search + hash)
      );
    </script>
  </head>
  <body></body>
</html>
